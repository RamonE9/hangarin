{% extends "base.html" %}
{% load socialaccount %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow p-4">

<h4 class="text-center mb-3">Login</h4>

<form method="post">
    {% csrf_token %}

    <input type="text" name="login" class="form-control mb-3" placeholder="Username or Email">

    <input type="password" name="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100">Login</button>
</form>

<hr>

<a href="{% provider_login_url 'google' %}" class="btn btn-danger w-100">
    <i class="fab fa-google"></i> Login with Google
</a>

<a href="{% url 'account_signup' %}" class="btn btn-outline-primary w-100 mt-2">
    Create an Account
</a>

</div>

</div>
</div>

{% endblock %}
