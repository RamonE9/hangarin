{% extends "base.html" %}
{% load socialaccount %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow p-4">

<h4 class="text-center mb-3">Create Account</h4>

<form method="post">
    {% csrf_token %}

    {% for field in form %}
    <div class="mb-3">
        {{ field.label_tag }}
        {{ field }}
        {% if field.errors %}
        <div class="text-danger small">
            {{ field.errors }}
        </div>
        {% endif %}
    </div>
    {% endfor %}

    <button class="btn btn-primary w-100">
        Sign Up
    </button>

</form>

<hr>

<a href="{% provider_login_url 'google' %}" class="btn btn-danger w-100">
    <i class="fab fa-google"></i> Sign up with Google
</a>

<a href="{% url 'account_login' %}" class="btn btn-outline-secondary w-100 mt-2">
    Already have an account? Login
</a>

</div>

</div>
</div>

{% endblock %}
